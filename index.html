<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Measurer app</title>

    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">

<div id="top-bar">
    <div style="display: flex; align-items: center;">
        <button id="btn-mobile-menu" title="Menu" style="display: none; padding: 6px; background: transparent; border: none; box-shadow: none;">
            <svg class="icon" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <div>
            <svg class="icon" style="vertical-align: middle; margin-right: 5px; stroke: var(--accent);" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            <strong>Measurer app</strong> <span id="help-text" style="color: var(--subtext);"></span>
        </div>
    </div>
    <div class="controls-wrapper">
        <button id="btn-theme" title="Toggle Theme">
            <svg class="icon" id="theme-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path></svg>
            <span id="theme-text">Dark</span>
        </button>
        <select id="lang-select">
            <option value="en" selected>🇬🇧 English</option>
            <option value="hu">🇭🇺 Magyar</option>
        </select>
    </div>
</div>

<div id="controls">
    <div class="groups-container">
        <div class="group">
            <svg class="icon" viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>
            <input type="file" id="upload" accept="image/*, application/json, .plan">
        </div>
        <div class="group">
            <button id="btn-scale" disabled>
                <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="10" width="18" height="4" rx="1"></rect><line x1="6" y1="10" x2="6" y2="12"></line><line x1="10" y1="10" x2="10" y2="14"></line></svg>
                <span data-i18n="btnScale">Scale</span>
            </button>
            <button id="btn-set-scale" class="action" disabled>
                <svg class="icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                <span data-i18n="btnSetScale">Confirm</span>
            </button>
        </div>
        <div class="group">
            <button id="btn-measure" disabled>
                <svg class="icon" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
                <span data-i18n="btnMeasure">Cables</span>
            </button>
            <button id="btn-new-cable" class="cable-btn" disabled>
                <svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                <span data-i18n="btnNewCable">New</span>
            </button>
            <button id="btn-connect" class="cable-btn" disabled>
                <svg class="icon" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                <span data-i18n="btnConnect">Connect</span>
            </button>
            <select id="cable-type-select" disabled>
                <option value="cat5e">Cat5e</option>
                <option value="cat6" selected>Cat6</option>
                <option value="cat6a">Cat6a</option>
                <option value="fiber">Fiber</option>
                <option value="power">Power</option>
                <option value="default">Default</option>
            </select>
            <button id="btn-undo" disabled>
                <svg class="icon" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 102.13-9.36L1 10"></path></svg>
                <span data-i18n="btnUndo">Undo</span>
            </button>
            <button id="btn-clear" disabled>
                <svg class="icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path></svg>
                <span data-i18n="btnClear">Clear</span>
            </button>
        </div>
        <div class="group">
            <button id="btn-toggle-layers" title="Toggle Cable/Device Visibility">👁️ Layers</button>
            <button id="btn-snap-grid" title="Toggle Snap to Grid">🧲 Grid</button>
        </div>
        <div class="group" style="margin-left: auto;">
            <button id="btn-export-plan" class="export-btn" disabled>
                <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                <span data-i18n="btnExportPlan">Save .plan</span>
            </button>
            <button id="btn-export" class="export-btn" disabled>
                <svg class="icon" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                <span data-i18n="btnExport">Export PNG</span>
            </button>
        </div>
    </div>
    <div id="status-bar">
        <span id="measurements"></span>
    </div>
</div>

<div id="workspace">
    <div id="sidebar">
        <div class="sidebar-title" data-i18n="sideTitle">Devices</div>
        <div class="sidebar-item" data-type="router">
            <svg class="icon" viewBox="0 0 24 24" style="width:24px; height:24px;"><rect x="2" y="5" width="20" height="14" rx="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line><circle cx="6" cy="15" r="1"></circle><circle cx="12" cy="15" r="1"></circle><circle cx="18" cy="15" r="1"></circle></svg>
            <span>Router</span>
        </div>
        <div class="sidebar-item" data-type="switch">
            <svg class="icon" viewBox="0 0 24 24" style="width:24px; height:24px;"><rect x="2" y="5" width="20" height="14" rx="2"></rect><line x1="2" y1="12" x2="22" y2="12"></line><line x1="6" y1="8" x2="6" y2="16"></line><line x1="10" y1="8" x2="10" y2="16"></line><line x1="14" y1="8" x2="14" y2="16"></line><line x1="18" y1="8" x2="18" y2="16"></line></svg>
            <span>Switch</span>
        </div>
        <div class="sidebar-item" data-type="patch">
            <svg class="icon" viewBox="0 0 24 24" style="width:24px; height:24px;"><rect x="2" y="7" width="20" height="10" rx="1"></rect><circle cx="6" cy="12" r="1"></circle><circle cx="10" cy="12" r="1"></circle><circle cx="14" cy="12" r="1"></circle><circle cx="18" cy="12" r="1"></circle></svg>
            <span>Patch</span>
        </div>
        <div class="sidebar-item" data-type="ap">
            <svg class="icon" viewBox="0 0 24 24" style="width:24px; height:24px;"><circle cx="12" cy="12" r="2"></circle><path d="M12 2a10 10 0 0 1 10 10"></path><path d="M12 6a6 6 0 0 1 6 6"></path><path d="M12 18a6 6 0 0 1-6-6"></path><path d="M12 22a10 10 0 0 1-10-10"></path></svg>
            <span>AP</span>
        </div>
        <div class="sidebar-item" data-type="pc">
            <svg class="icon" viewBox="0 0 24 24" style="width:24px; height:24px;"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
            <span>PC</span>
        </div>
        <div class="sidebar-item" data-type="rack">
            <svg class="icon" viewBox="0 0 24 24" style="width:24px; height:24px;"><rect x="4" y="2" width="16" height="20" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><line x1="4" y1="6" x2="20" y2="6" stroke="currentColor" stroke-width="2"/><line x1="4" y1="11" x2="20" y2="11" stroke="currentColor" stroke-width="2"/><line x1="4" y1="16" x2="20" y2="16" stroke="currentColor" stroke-width="2"/></svg>
            <span>Rack</span>
        </div>
    </div>
    
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
        <div id="zoom-controls" style="position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 5px; z-index: 100;">
            <button id="btn-zoom-in" title="Zoom In" style="padding: 5px 10px; font-weight: bold;">+</button>
            <button id="btn-zoom-out" title="Zoom Out" style="padding: 5px 10px; font-weight: bold;">-</button>
            <button id="btn-zoom-reset" title="Reset View" style="padding: 5px 10px; font-weight: bold;">⟲</button>
        </div>
    </div>
</div>



    <div id="context-menu">
        <div class="ctx-item" id="ctx-rename">
            <svg class="icon" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            <span data-i18n="ctxRename">Rename</span>
        </div>
        <div class="ctx-item danger" id="ctx-delete-device">
            <svg class="icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            <span data-i18n="ctxDelete">Delete Device</span>
        </div>
        <div class="ctx-item danger" id="ctx-delete-point">
            <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
            <span data-i18n="ctxDeletePoint">Delete Point</span>
        </div>
        <div style="height: 1px; background: var(--border); margin: 4px 0;"></div>
        <div class="ctx-item" id="ctx-undo">
            <svg class="icon" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 102.13-9.36L1 10"></path></svg>
            <span data-i18n="btnUndo">Undo</span>
        </div>
    </div>

<!-- SWITCH PANEL MODAL -->
<div id="switch-modal-overlay">
  <div id="switch-modal">
    <div id="switch-modal-header">
      <div class="sw-title">
        <svg class="icon" viewBox="0 0 24 24" style="width:20px;height:20px"><rect x="2" y="5" width="20" height="14" rx="2"></rect><line x1="2" y1="12" x2="22" y2="12"></line><line x1="6" y1="8" x2="6" y2="16"></line><line x1="10" y1="8" x2="10" y2="16"></line><line x1="14" y1="8" x2="14" y2="16"></line><line x1="18" y1="8" x2="18" y2="16"></line></svg>
        <span id="sw-modal-title">Device</span>
        <div style="margin-left: 20px; font-size: 14px; font-weight: normal; display: flex; align-items: center; gap: 5px;">
            <label>Ports:</label>
            <input type="number" id="sw-f-port-count" min="1" max="128" value="24" style="width: 50px; padding: 2px; font-size: 14px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px;">
        </div>
      </div>
      <button id="switch-modal-close" title="Close">✕</button>
    </div>
    <div id="sw-faceplate">
      <div class="sw-port-row" id="sw-port-leds"></div>
    </div>
    <div id="sw-editor">
      <div id="sw-editor-placeholder">Click a port to configure it.</div>
      <div id="sw-port-editor">
        <h3 id="sw-port-editor-title">Port 1</h3>
        <div class="sw-field-row"><label>Port label</label><input id="sw-f-label" type="text" placeholder="e.g. PC-01"></div>
        <div class="sw-field-row"><label>VLAN</label><input id="sw-f-vlan" type="number" min="1" max="4094" placeholder="1"></div>
        <div class="sw-field-row"><label>Mode</label><select id="sw-f-mode"><option value="access">Access</option><option value="trunk">Trunk</option><option value="uplink">Uplink</option></select></div>
        <div class="sw-field-row"><label>Connected to</label><input id="sw-f-conn" type="text" placeholder="e.g. PP-1 port 3"></div>
        <div class="sw-field-row"><label>Notes</label><input id="sw-f-notes" type="text" placeholder="optional notes"></div>
      </div>
      <div id="sw-rack-info" style="display: none; padding: 20px; text-align: center; color: var(--subtext);"></div>
    </div>
    <div id="sw-modal-footer">
      <button id="sw-btn-clear-port" style="background:var(--bg);color:var(--danger);border-color:var(--danger);">Clear Port</button>
      <button id="sw-btn-save" class="action">Save &amp; Close</button>
    </div>
  </div>
    <div id="toast" class="toast"></div>
</div>

<div id="port-selector-popup" class="port-popup">
    <div class="port-popup-title" data-i18n="selectPort">Select Port</div>
    <div class="port-popup-grid" id="port-popup-grid"></div>
</div>

<script src="app.js"></script>
</body>
</html>
