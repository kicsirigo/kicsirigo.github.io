<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Measurer app</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* Catppuccin Témák */
        :root {
            --bg: #eff1f5;
            --panel: #e6e9ef;
            --text: #4c4f69;
            --subtext: #7c7f93;
            --border: #bcc0cc;
            --accent: #1e66f5;
            --accent-hover: #1e66f5cc;
            --success: #40a02b;
            --warning: #df8e1d;
            --danger: #d20f39;
            --canvas-bg: #ccd0da;
            --shadow: rgba(76, 79, 105, 0.15);
            --dev-router: #c6a0f6;
            --dev-switch: #8bd5ca;
            --dev-patch: #f5bde6;
            --dev-ap: #eed49f;
            --dev-pc: #8caaee;
        }

        [data-theme="dark"] {
            --bg: #24273a;
            --panel: #1e2030;
            --text: #cad3f5;
            --subtext: #a5adcb;
            --border: #494d64;
            --accent: #8aadf4;
            --accent-hover: #8aadf4cc;
            --success: #a6da95;
            --warning: #eed49f;
            --danger: #ed8796;
            --canvas-bg: #181926;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 0; 
            background: var(--bg); color: var(--text); 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* Top Bar & Controls */
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseSubtle { 0% { box-shadow: 0 0 0 0 var(--accent-hover); } 50% { box-shadow: 0 0 10px 4px var(--accent-hover); } 100% { box-shadow: 0 0 0 0 var(--accent-hover); } }

        #top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--panel); padding: 8px 20px; border-bottom: 1px solid var(--border); font-size: 0.9em; box-shadow: 0 2px 5px var(--shadow); z-index: 101; }
        .controls-wrapper { display: flex; gap: 10px; align-items: center; }
        #controls { background: var(--panel); padding: 12px 20px; box-shadow: 0 4px 15px var(--shadow); z-index: 100; flex-shrink: 0; border-bottom: 1px solid var(--border); animation: slideDown 0.5s ease; }
        .groups-container { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 5px; }
        .group { display: flex; align-items: center; gap: 8px; background: var(--bg); padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); }
        
        button, select, input[type="file"]::file-selector-button { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; font-weight: 600; font-size: 0.9em; cursor: pointer; border-radius: 6px; border: 1px solid var(--border); background: var(--panel); color: var(--text); transition: all 0.2s; outline: none; }
        select { appearance: none; padding-right: 25px; background: url('data:image/svg+xml;utf8,<svg fill="%237c7f93" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>') no-repeat right 5px center; background-size: 20px; }
        button:hover:not(:disabled), select:hover, input[type="file"]::file-selector-button:hover { background: var(--border); transform: translateY(-2px); box-shadow: 0 4px 8px var(--shadow); }
        button:active:not(:disabled) { transform: translateY(0); }
        button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        button.action { background: var(--success); color: var(--bg); border-color: var(--success); }
        button.cable-btn { background: var(--warning); color: #11111b; border-color: var(--warning); }
        button.export-btn { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        button:disabled { background: var(--bg); color: var(--subtext); cursor: not-allowed; opacity: 0.5; transform: none; box-shadow: none; border-color: transparent;}
        
        svg.icon { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .active svg.icon, .action svg.icon, .export-btn svg.icon { stroke: var(--bg); }
        .cable-btn svg.icon { stroke: #11111b; }

        /* Workspace & Sidebar */
        #workspace { display: flex; flex-grow: 1; position: relative; overflow: hidden; }
        #sidebar { width: 85px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 15px; box-shadow: 2px 0 5px var(--shadow); z-index: 95; }
        .sidebar-title { font-size: 0.7em; font-weight: bold; text-transform: uppercase; color: var(--subtext); text-align: center; margin-bottom: 5px; }
        .sidebar-item { width: 60px; height: 60px; background: var(--bg); border: 2px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: grab; transition: all 0.2s; font-size: 0.7em; font-weight: bold; user-select: none; text-align: center; padding: 2px; }
        .sidebar-item:hover { transform: scale(1.08); box-shadow: 0 4px 10px var(--shadow); }

        .sidebar-item.active-place[data-type="router"] { background: var(--dev-router); color: #11111b !important; border-color: var(--dev-router) !important; }
        .sidebar-item.active-place[data-type="switch"] { background: var(--dev-switch); color: #11111b !important; border-color: var(--dev-switch) !important; }
        .sidebar-item.active-place[data-type="patch"] { background: var(--dev-patch); color: #11111b !important; border-color: var(--dev-patch) !important; }
        .sidebar-item.active-place[data-type="ap"] { background: var(--dev-ap); color: #11111b !important; border-color: var(--dev-ap) !important; }
        .sidebar-item.active-place[data-type="pc"] { background: var(--dev-pc); color: #11111b !important; border-color: var(--dev-pc) !important; }
        .sidebar-item.active-place span { color: #11111b !important; }
        
        .sidebar-item[data-type="router"] { border-color: var(--dev-router); color: var(--dev-router); }
        .sidebar-item[data-type="switch"] { border-color: var(--dev-switch); color: var(--dev-switch); }
        .sidebar-item[data-type="patch"] { border-color: var(--dev-patch); color: var(--dev-patch); }
        .sidebar-item[data-type="ap"] { border-color: var(--dev-ap); color: var(--dev-ap); }
        .sidebar-item[data-type="pc"] { border-color: var(--dev-pc); color: var(--dev-pc); }
        .sidebar-item span { color: var(--text); font-size: 0.85em; margin-top: 4px; }

        #status-bar { display: flex; justify-content: space-between; align-items: center; padding-top: 5px; font-weight: bold; }
        #status { color: var(--danger); font-size: 1.05em; }
        #measurements { color: var(--success); font-size: 1.05em; text-align: right; }
        
        /* ponytail: Use native crosshair cursor */
        #canvas-container { flex-grow: 1; position: relative; background: var(--canvas-bg); cursor: crosshair; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; cursor: crosshair; }
        input[type="file"] { border: none; background: transparent; padding: 0; color: var(--text); width: 160px; }

        /* CONTEXT MENU */
        #context-menu {
            position: fixed; background: var(--panel); border: 1px solid var(--border);
            border-radius: 8px; box-shadow: 0 4px 20px var(--shadow); z-index: 1000;
            display: none; flex-direction: column; overflow: hidden; min-width: 160px;
        }
        .ctx-item {
            padding: 10px 15px; cursor: pointer; display: flex; align-items: center;
            gap: 10px; font-size: 0.9em; font-weight: 600; color: var(--text);
            transition: background 0.2s;
        }
        .ctx-item:hover { background: var(--bg); }
        .ctx-item.danger { color: var(--danger); }
        .ctx-item.danger svg { stroke: var(--danger); }
        /* SWITCH PANEL MODAL */
        #switch-modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.55); z-index: 2000;
            align-items: center; justify-content: center;
        }
        #switch-modal-overlay.open { display: flex; }
        #switch-modal {
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 14px; box-shadow: 0 8px 40px rgba(0,0,0,0.45);
            width: min(820px, 96vw); max-height: 90vh;
            display: flex; flex-direction: column; overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        #switch-modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px; border-bottom: 1px solid var(--border);
            background: var(--panel);
        }
        #switch-modal-header .sw-title {
            display: flex; align-items: center; gap: 10px;
            font-weight: 700; font-size: 1.05em; color: var(--text);
        }
        #switch-modal-header .sw-title svg { stroke: var(--dev-switch); }
        #switch-modal-close {
            background: none; border: 1px solid var(--border); cursor: pointer;
            color: var(--subtext); font-size: 1.2em; padding: 2px 8px;
            border-radius: 6px; transition: background 0.15s;
        }
        #switch-modal-close:hover { background: var(--border); color: var(--text); transform: none; box-shadow: none; }
        /* Physical faceplate — always dark like real hardware */
        #sw-faceplate {
            background: #1a1c2a; padding: 18px 20px 10px;
            border-bottom: 1px solid var(--border);
        }
        .sw-port-row { display: flex; flex-wrap: wrap; gap: 5px; justify-content: flex-start; }
        .sw-port-led {
            width: 28px; height: 22px; border-radius: 3px;
            background: #0d0e17; border: 1px solid #353849;
            cursor: pointer; position: relative;
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: 700; color: #555870;
            transition: all 0.15s;
        }
        .sw-port-led:hover { border-color: #8aadf4; color: #8aadf4; }
        .sw-port-led.has-config { background: #0d2b1a; border-color: #40a02b; color: #a6da95; }
        .sw-port-led.selected { outline: 2px solid #8aadf4; outline-offset: 2px; background: #192040 !important; color: #8aadf4 !important; border-color: #8aadf4 !important; }
        .sw-port-led::after {
            content: '';
            position: absolute; top: 3px; right: 3px;
            width: 5px; height: 5px; border-radius: 50%;
            background: #2a2d3e;
        }
        .sw-port-led.has-config::after { background: #40a02b; box-shadow: 0 0 5px #40a02b99; }
        .sw-port-led.selected::after { background: #8aadf4; box-shadow: 0 0 5px #8aadf499; }

        /* Editor panel */
        #sw-editor {
            padding: 16px 20px; overflow-y: auto;
            flex: 1 1 auto; min-height: 250px;
            background: var(--bg);
        }
        #sw-editor-placeholder {
            color: var(--subtext); font-size: 0.9em;
            text-align: center; padding: 30px 0;
        }
        #sw-port-editor { display: none; }
        #sw-port-editor h3 {
            margin: 0 0 14px; font-size: 1em; color: var(--accent);
            display: flex; align-items: center; gap: 8px;
            padding-bottom: 10px; border-bottom: 1px solid var(--border);
        }
        .sw-field-row {
            display: grid; grid-template-columns: 130px 1fr; align-items: center;
            gap: 8px; margin-bottom: 10px;
        }
        .sw-field-row label { font-size: 0.85em; font-weight: 600; color: var(--subtext); }
        .sw-field-row input[type="text"],
        .sw-field-row input[type="number"],
        .sw-field-row select {
            padding: 7px 10px; border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--panel);
            color: var(--text); font-size: 0.9em; width: 100%; box-sizing: border-box;
            appearance: auto;
            outline: none;
        }
        /* Reset global select style overrides inside the switch modal */
        .sw-field-row select {
            background-image: none;
            padding-right: 10px;
        }
        .sw-field-row input[type="text"]:focus,
        .sw-field-row input[type="number"]:focus,
        .sw-field-row select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-hover); }
        #sw-modal-footer {
            padding: 12px 20px; border-top: 1px solid var(--border);
            display: flex; justify-content: flex-end; gap: 10px;
            background: var(--panel);
        }
        #sw-modal-footer button { min-width: 90px; }
        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            #top-bar { padding: 10px; }
            #btn-mobile-menu { display: inline-flex !important; margin-right: 10px; }
            #help-text { display: none !important; }
            
            #controls { 
                display: none; 
                flex-direction: column; 
                position: absolute; 
                top: 50px; left: 0; right: 0; 
                background: var(--panel); 
                border-bottom: 1px solid var(--border); 
                box-shadow: 0 4px 15px var(--shadow);
                max-height: calc(100vh - 50px);
                overflow-y: auto;
            }
            #controls.open { display: flex; }
            
            .groups-container { flex-direction: column; }
            .group { justify-content: center; }
            
            #workspace { flex-direction: column; }
            #canvas-container { height: calc(100vh - 120px); }
            
            #sidebar { 
                width: 100%; height: 85px; 
                flex-direction: row; 
                border-right: none; 
                border-top: 1px solid var(--border); 
                overflow-x: auto; 
                justify-content: flex-start;
                padding: 10px; box-sizing: border-box;
            }
            .sidebar-title { display: none; }
            .sidebar-item { flex-shrink: 0; }
            
            #switch-modal { width: 95vw; margin: 0 auto; }
            .sw-field-row { grid-template-columns: 1fr; gap: 4px; }
            .sw-field-row label { font-size: 0.8em; }
        }
    </style>
</head>
<body data-theme="light">

<div id="top-bar">
    <div style="display: flex; align-items: center;">
        <button id="btn-mobile-menu" title="Menu" style="display: none; padding: 6px; background: transparent; border: none; box-shadow: none;">
            <svg class="icon" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <div>
            <svg class="icon" style="vertical-align: middle; margin-right: 5px; stroke: var(--accent);" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            <strong>Measurer app</strong> <span id="help-text" style="color: var(--subtext);"></span>
        </div>
    </div>
    <div class="controls-wrapper">
        <button id="btn-theme" title="Toggle Theme">
            <svg class="icon" id="theme-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path></svg>
            <span id="theme-text">Dark</span>
        </button>
        <select id="lang-select">
            <option value="en" selected>🇬🇧 English</option>
            <option value="hu">🇭🇺 Magyar</option>
        </select>
    </div>
</div>

<div id="controls">
    <div class="groups-container">
        <div class="group">
            <svg class="icon" viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>
            <input type="file" id="upload" accept="image/*, application/pdf, application/json">
        </div>
        <div class="group">
            <button id="btn-scale" disabled>
                <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="10" width="18" height="4" rx="1"></rect><line x1="6" y1="10" x2="6" y2="12"></line><line x1="10" y1="10" x2="10" y2="14"></line></svg>
                <span data-i18n="btnScale">Scale</span>
            </button>
            <button id="btn-set-scale" class="action" disabled>
                <svg class="icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                <span data-i18n="btnSetScale">Confirm</span>
            </button>
        </div>
        <div class="group">
            <button id="btn-measure" disabled>
                <svg class="icon" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
                <span data-i18n="btnMeasure">Cables</span>
            </button>
            <button id="btn-new-cable" class="cable-btn" disabled>
                <svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                <span data-i18n="btnNewCable">New</span>
            </button>
            <button id="btn-undo" disabled>
                <svg class="icon" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 102.13-9.36L1 10"></path></svg>
                <span data-i18n="btnUndo">Undo</span>
            </button>
            <button id="btn-clear" disabled>
                <svg class="icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path></svg>
                <span data-i18n="btnClear">Clear</span>
            </button>
        </div>
        <div class="group">
            <button id="btn-toggle-layers" title="Toggle Cable/Device Visibility">👁️ Layers</button>
            <button id="btn-snap-grid" title="Toggle Snap to Grid">🧲 Grid</button>
        </div>
        <div class="group" style="margin-left: auto;">
            <button id="btn-export" class="export-btn" disabled>
                <svg class="icon" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                <span data-i18n="btnExport">Export</span>
            </button>
        </div>
    </div>
    <div id="status-bar">
        <span id="status">Load a floorplan plan to start!</span>
        <span id="measurements"></span>
    </div>
</div>

<div id="workspace">
    <div id="sidebar">
        <div class="sidebar-title" data-i18n="sideTitle">Devices</div>
        <div class="sidebar-item" data-type="router">
            <svg class="icon" viewBox="0 0 24 24" style="width:24px; height:24px;"><rect x="2" y="5" width="20" height="14" rx="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line><circle cx="6" cy="15" r="1"></circle><circle cx="12" cy="15" r="1"></circle><circle cx="18" cy="15" r="1"></circle></svg>
            <span>Router</span>
        </div>
        <div class="sidebar-item" data-type="switch">
            <svg class="icon" viewBox="0 0 24 24" style="width:24px; height:24px;"><rect x="2" y="5" width="20" height="14" rx="2"></rect><line x1="2" y1="12" x2="22" y2="12"></line><line x1="6" y1="8" x2="6" y2="16"></line><line x1="10" y1="8" x2="10" y2="16"></line><line x1="14" y1="8" x2="14" y2="16"></line><line x1="18" y1="8" x2="18" y2="16"></line></svg>
            <span>Switch</span>
        </div>
        <div class="sidebar-item" data-type="patch">
            <svg class="icon" viewBox="0 0 24 24" style="width:24px; height:24px;"><rect x="2" y="7" width="20" height="10" rx="1"></rect><circle cx="6" cy="12" r="1"></circle><circle cx="10" cy="12" r="1"></circle><circle cx="14" cy="12" r="1"></circle><circle cx="18" cy="12" r="1"></circle></svg>
            <span>Patch</span>
        </div>
        <div class="sidebar-item" data-type="ap">
            <svg class="icon" viewBox="0 0 24 24" style="width:24px; height:24px;"><circle cx="12" cy="12" r="2"></circle><path d="M12 2a10 10 0 0 1 10 10"></path><path d="M12 6a6 6 0 0 1 6 6"></path><path d="M12 18a6 6 0 0 1-6-6"></path><path d="M12 22a10 10 0 0 1-10-10"></path></svg>
            <span>AP</span>
        </div>
        <div class="sidebar-item" data-type="pc">
            <svg class="icon" viewBox="0 0 24 24" style="width:24px; height:24px;"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
            <span>PC</span>
        </div>
    </div>
    
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
        <div id="zoom-controls" style="position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 5px; z-index: 100;">
            <button id="btn-zoom-in" title="Zoom In" style="padding: 5px 10px; font-weight: bold;">+</button>
            <button id="btn-zoom-out" title="Zoom Out" style="padding: 5px 10px; font-weight: bold;">-</button>
            <button id="btn-zoom-reset" title="Reset View" style="padding: 5px 10px; font-weight: bold;">⟲</button>
        </div>
    </div>
</div>



    <div id="context-menu">
        <div class="ctx-item" id="ctx-rename">
            <svg class="icon" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            <span data-i18n="ctxRename">Rename</span>
        </div>
        <div class="ctx-item danger" id="ctx-delete-device">
            <svg class="icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            <span data-i18n="ctxDelete">Delete Device</span>
        </div>
        <div class="ctx-item danger" id="ctx-delete-point">
            <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
            <span data-i18n="ctxDeletePoint">Delete Point</span>
        </div>
        <div style="height: 1px; background: var(--border); margin: 4px 0;"></div>
        <div class="ctx-item" id="ctx-undo">
            <svg class="icon" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 102.13-9.36L1 10"></path></svg>
            <span data-i18n="btnUndo">Undo</span>
        </div>
    </div>

<!-- SWITCH PANEL MODAL -->
<div id="switch-modal-overlay">
  <div id="switch-modal">
    <div id="switch-modal-header">
      <div class="sw-title">
        <svg class="icon" viewBox="0 0 24 24" style="width:20px;height:20px"><rect x="2" y="5" width="20" height="14" rx="2"></rect><line x1="2" y1="12" x2="22" y2="12"></line><line x1="6" y1="8" x2="6" y2="16"></line><line x1="10" y1="8" x2="10" y2="16"></line><line x1="14" y1="8" x2="14" y2="16"></line><line x1="18" y1="8" x2="18" y2="16"></line></svg>
        <span id="sw-modal-title">Switch</span>
      </div>
      <button id="switch-modal-close" title="Close">✕</button>
    </div>
    <div id="sw-faceplate">
      <div class="sw-port-row" id="sw-port-leds"></div>
    </div>
    <div id="sw-editor">
      <div id="sw-editor-placeholder">Click a port to configure it.</div>
      <div id="sw-port-editor">
        <h3 id="sw-port-editor-title">Port 1</h3>
        <div class="sw-field-row"><label>Port label</label><input id="sw-f-label" type="text" placeholder="e.g. PC-01"></div>
        <div class="sw-field-row"><label>VLAN</label><input id="sw-f-vlan" type="number" min="1" max="4094" placeholder="1"></div>
        <div class="sw-field-row"><label>Mode</label><select id="sw-f-mode"><option value="access">Access</option><option value="trunk">Trunk</option><option value="uplink">Uplink</option></select></div>
        <div class="sw-field-row"><label>Connected to</label><input id="sw-f-conn" type="text" placeholder="e.g. PP-1 port 3"></div>
        <div class="sw-field-row"><label>Notes</label><input id="sw-f-notes" type="text" placeholder="optional notes"></div>
      </div>
    </div>
    <div id="sw-modal-footer">
      <button id="sw-btn-clear-port" style="background:var(--bg);color:var(--danger);border-color:var(--danger);">Clear Port</button>
      <button id="sw-btn-save" class="action">Save &amp; Close</button>
    </div>
  </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const i18n = {
        en: {
            help: "Zoom: Wheel | Pan: Right Click / Drag | Grid Offset: Shift + Drag | Menu: Right Click",
            btnScale: "Scale", btnSetScale: "Confirm", btnMeasure: "Draw Cables",
            btnNewCable: "New Cable", btnUndo: "Undo", btnClear: "Clear All", btnExport: "Export",
            sideTitle: "Devices",
            statLoad: "Load a PDF or Image floorplan!",
            statLoaded: "Loaded. Click 'Scale' to begin!",
            statScale: "Click both ends of a known wall! (Draggable)",
            statSetScale: "Adjust points, then click 'Confirm'!",
            statScaleSaved: "Scale saved! Click 'Draw Cables' or drag devices.",
            statScaleInvalid: "Invalid value. Try again!",
            statMeasure: "Click along the path! Use 'New Cable' for a new line.",
            statEditCable: "Editing Cable #{0}...",
            statScaleChanged: "Scale changed! You must click 'Confirm' again.",
            promptMeter: "How many meters is this line in reality? (e.g. 12.34)",
            confirmClear: "Are you sure you want to clear all data (cables & devices)?",
            textActive: "Active (#{0})", textTotal: "Total",
            statPlaceDevice: "Click/Tap on the map to place the device: {0}",
            ctxRename: "Rename", ctxDelete: "Delete Device", ctxDeletePoint: "Delete Point",
            promptRename: "Enter a new name for this device:"
        },
        hu: {
            help: "Nagyítás: Görgő | Mozgatás: Jobb klikk / Húzás | Rács eltolás: Shift + Húzás | Menü: Jobb klikk",
            btnScale: "Méretarány", btnSetScale: "Véglegesítés", btnMeasure: "Kábelezés",
            btnNewCable: "Új kábel", btnUndo: "Vissza", btnClear: "Minden törlése", btnExport: "Export",
            sideTitle: "Eszközök",
            statLoad: "Tölts be egy PDF-et vagy képet!",
            statLoaded: "Betöltve. Kattints a 'Méretarány' gombra!",
            statScale: "Kattints a fal két végére! (A pontok húzhatók)",
            statSetScale: "Igazítsd a helyére, majd kattints a 'Véglegesítés' gombra!",
            statScaleSaved: "Méretarány mentve! Kattints a 'Kábelezés' gombra vagy húzz be eszközöket.",
            statScaleInvalid: "Érvénytelen érték. Próbáld újra!",
            statMeasure: "Kattints a kábel útján! Új kábelhez: 'Új kábel'.",
            statEditCable: "Kábel #{0} szerkesztése...",
            statScaleChanged: "Megváltoztattad a méretarányt! Kattints újra a 'Véglegesítés' gombra.",
            promptMeter: "Hány méter ez a szakasz a valóságban? (Pl. 12.34)",
            confirmClear: "Biztosan törölsz minden kábelt és eszközt?",
            textActive: "Aktuális (#{0})", textTotal: "Összesen",
            statPlaceDevice: "Kattints/Koppints a térképre az eszköz elhelyezéséhez: {0}",
            ctxRename: "Átnevezés", ctxDelete: "Eszköz Törlése", ctxDeletePoint: "Pont Törlése",
            promptRename: "Add meg az eszköz új nevét:"
        }
    };

    let lang = 'en';
    let theme = 'light';
    function t(key, arg1 = "") { return i18n[lang][key].replace("{0}", arg1); }

    const btnScale = document.getElementById('btn-scale'), btnSetScale = document.getElementById('btn-set-scale');
    const btnMeasure = document.getElementById('btn-measure'), btnNewCable = document.getElementById('btn-new-cable');
    const btnUndo = document.getElementById('btn-undo'), btnClear = document.getElementById('btn-clear');
    const btnExport = document.getElementById('btn-export'), status = document.getElementById('status');
    const measurements = document.getElementById('measurements'), canvasContainer = document.getElementById('canvas-container');
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const contextMenu = document.getElementById('context-menu');

    const cableColors = ['#ed8796', '#8aadf4', '#a6da95', '#eed49f', '#c6a0f6', '#8bd5ca', '#f5bde6'];
    const deviceColors = { router: '#c6a0f6', switch: '#8bd5ca', patch: '#f5bde6', ap: '#eed49f', pc: '#8caaee' };
    const deviceShortnames = { router: 'RT', switch: 'SW', patch: 'PP', ap: 'AP', pc: 'PC' };

    let img = new Image();
    let mode = 'none', scalePoints = [], cables = [[]], devices = [], actionHistory = []; 
    let activeCableIndex = 0, pixelsPerMeter = null;
    let showLayers = true, snapToGrid = false;
    let gridOffsetX = 0, gridOffsetY = 0;

    let cameraX = 0, cameraY = 0, zoom = 1, isPanning = false, panStartX = 0, panStartY = 0;
    let isPanningGrid = false, gridPanStartX = 0, gridPanStartY = 0;
    let draggedPoint = null, activePlaceDevice = null, activeContextMenuTarget = null, hasDragged = false;
    
    // ponytail: Removed custom crosshair variables

    // --- TÉMA ÉS NYELV ---
    document.getElementById('btn-theme').addEventListener('click', () => {
        theme = theme === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', theme);
        document.getElementById('theme-text').innerText = theme === 'light' ? 'Dark' : 'Light';
        redraw();
    });

    function updateLanguageUI() {
        document.getElementById('help-text').innerText = t('help');
        document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = t(el.getAttribute('data-i18n')));
        if (!img.src) status.innerText = t('statLoad');
        redraw();
    }
    document.getElementById('lang-select').addEventListener('change', e => { lang = e.target.value; updateLanguageUI(); });

    // ponytail: Removed drag-and-drop code, using click-to-place exclusively
    document.querySelectorAll('.sidebar-item').forEach(item => {
        item.addEventListener('click', () => {
            if(!img.src) return;
            if (activePlaceDevice === item.dataset.type) {
                activePlaceDevice = null; item.classList.remove('active-place'); status.innerText = t('statScaleSaved');
            } else {
                document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active-place'));
                activePlaceDevice = item.dataset.type; item.classList.add('active-place'); mode = 'none';
                btnScale.classList.remove('active'); btnMeasure.classList.remove('active');
                status.innerText = t('statPlaceDevice', item.dataset.type.toUpperCase());
            }
        });
    });

    // --- FÁJL BETÖLTÉS ÉS GOMBOK ---
    function resizeCanvas() { canvas.width = canvasContainer.clientWidth; canvas.height = canvasContainer.clientHeight; redraw(); }
    window.addEventListener('resize', resizeCanvas);

    function restoreState(data, resetCamera) {
        scalePoints = data.scalePoints || [];
        cables = data.cables || [[]];
        devices = data.devices || [];
        pixelsPerMeter = data.pixelsPerMeter || null;
        gridOffsetX = data.gridOffsetX || 0;
        gridOffsetY = data.gridOffsetY || 0;
        activeCableIndex = cables.length - 1;
        btnScale.disabled = false; btnExport.disabled = false; btnUndo.disabled = false;
        btnMeasure.disabled = btnNewCable.disabled = btnClear.disabled = (pixelsPerMeter === null);
        if (resetCamera) {
            zoom = data.zoom || Math.min(canvas.width/img.width, canvas.height/img.height) * 0.95;
            cameraX = (data.cameraX !== undefined) ? data.cameraX : (canvas.width - img.width * zoom) / 2;
            cameraY = (data.cameraY !== undefined) ? data.cameraY : (canvas.height - img.height * zoom) / 2;
        }
        status.innerText = t('statLoaded');
        redraw();
    }

    document.getElementById('upload').addEventListener('change', e => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        if (file.name.endsWith('.json')) {
            reader.onload = ev => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (data.imgSrc) { img.onload = () => { resizeCanvas(); restoreState(data, true); }; img.src = data.imgSrc; }
                } catch (err) { alert('Error loading JSON data'); }
            };
            reader.readAsText(file);
        } else if (file.type === 'application/pdf') {
            reader.onload = event => {
                pdfjsLib.getDocument(new Uint8Array(event.target.result)).promise.then(pdf => pdf.getPage(1)).then(page => {
                    const vp = page.getViewport({scale: 2.0}), tc = document.createElement('canvas'), tctx = tc.getContext('2d');
                    tc.width = vp.width; tc.height = vp.height;
                    page.render({canvasContext: tctx, viewport: vp}).promise.then(() => loadImageData(tc.toDataURL('image/png')));
                });
            }; reader.readAsArrayBuffer(file);
        } else {
            reader.onload = ev => loadImageData(ev.target.result); reader.readAsDataURL(file);
        }
    });

    function loadImageData(src) {
        img.onload = () => {
            resizeCanvas();
            scalePoints = []; cables = [[]]; devices = []; actionHistory = []; activeCableIndex = 0; pixelsPerMeter = null; mode = 'none';
            zoom = Math.min(canvas.width/img.width, canvas.height/img.height) * 0.95;
            cameraX = (canvas.width - img.width * zoom) / 2; cameraY = (canvas.height - img.height * zoom) / 2;
            btnScale.disabled = false; btnExport.disabled = false; btnUndo.disabled = false;
            status.innerText = t('statLoaded'); redraw();
        }; img.src = src;
    }

    // --- ZOOM ÉS EGÉR KOORDINÁTÁK ---
    canvasContainer.addEventListener('wheel', e => {
        if (!img.src) return;
        e.preventDefault();
        const zFactor = e.deltaY > 0 ? 0.9 : 1.1;
        const r = canvas.getBoundingClientRect(), mx = e.clientX - r.left, my = e.clientY - r.top;
        const wx = (mx - cameraX) / zoom, wy = (my - cameraY) / zoom;
        zoom = Math.max(0.05, Math.min(zoom * zFactor, 15));
        cameraX = mx - wx * zoom; cameraY = my - wy * zoom; 
        redraw();
    }, {passive: false});

    function getWorldPos(e) {
        const r = canvas.getBoundingClientRect(), cx = e.clientX || (e.touches && e.touches[0].clientX) || 0, cy = e.clientY || (e.touches && e.touches[0].clientY) || 0;
        return { x: ((cx - r.left) - cameraX) / zoom, y: ((cy - r.top) - cameraY) / zoom };
    }

    function findHoveredPoint(wPos) {
        const hit = 18 / zoom;
        for (let i = devices.length - 1; i >= 0; i--) if (Math.hypot(devices[i].x - wPos.x, devices[i].y - wPos.y) < hit) return { array: devices, index: i, type: 'device' };
        for (let i = 0; i < scalePoints.length; i++) if (Math.hypot(scalePoints[i].x - wPos.x, scalePoints[i].y - wPos.y) < hit) return { array: scalePoints, index: i, type: 'scale' };
        for (let c = cables.length - 1; c >= 0; c--) for (let i = 0; i < cables[c].length; i++) if (Math.hypot(cables[c][i].x - wPos.x, cables[c][i].y - wPos.y) < hit) return { array: cables[c], index: i, type: 'cable', cableIndex: c };
        return null;
    }

    // --- CONTEXT MENU (JOBB KLIKK) ---
    window.addEventListener('contextmenu', e => {
        e.preventDefault(); 
        contextMenu.style.display = 'none';
        if (!img.src || !e.target.closest('#canvas-container') || hasDragged) return;

        const hov = findHoveredPoint(getWorldPos(e));
        activeContextMenuTarget = hov;

        document.getElementById('ctx-rename').style.display = 'none';
        document.getElementById('ctx-delete-device').style.display = 'none';
        document.getElementById('ctx-delete-point').style.display = 'none';

        if (hov && hov.type === 'device') {
            document.getElementById('ctx-rename').style.display = 'flex';
            document.getElementById('ctx-delete-device').style.display = 'flex';
        } else if (hov && (hov.type === 'cable' || hov.type === 'scale')) {
            document.getElementById('ctx-delete-point').style.display = 'flex';
        }
        
        contextMenu.style.display = 'flex';
        contextMenu.style.left = e.clientX + 'px';
        contextMenu.style.top = e.clientY + 'px';
    });

    window.addEventListener('click', e => {
        if (!e.target.closest('#context-menu')) contextMenu.style.display = 'none';
    });

    document.getElementById('ctx-rename').addEventListener('click', () => {
        contextMenu.style.display = 'none';
        if (activeContextMenuTarget && activeContextMenuTarget.type === 'device') {
            const d = devices[activeContextMenuTarget.index];
            const newName = prompt(t('promptRename'), d.name || deviceShortnames[d.type]);
            if (newName !== null) { d.name = newName.trim() === "" ? null : newName; redraw(); autoSave(); }
        }
    });

    document.getElementById('ctx-delete-device').addEventListener('click', () => {
        contextMenu.style.display = 'none';
        if (activeContextMenuTarget && activeContextMenuTarget.type === 'device') { 
            devices.splice(activeContextMenuTarget.index, 1); 
            redraw(); 
            autoSave();
        }
    });

    document.getElementById('ctx-delete-point').addEventListener('click', () => {
        contextMenu.style.display = 'none';
        if (activeContextMenuTarget) {
            if (activeContextMenuTarget.type === 'cable') {
                cables[activeContextMenuTarget.cableIndex].splice(activeContextMenuTarget.index, 1);
            } else if (activeContextMenuTarget.type === 'scale') {
                scalePoints.splice(activeContextMenuTarget.index, 1);
                pixelsPerMeter = null; btnSetScale.disabled = true; btnScale.classList.add('active'); mode = 'scale';
            }
            redraw();
            autoSave();
        }
    });

    document.getElementById('ctx-undo').addEventListener('click', () => {
        contextMenu.style.display = 'none';
        if (!btnUndo.disabled) btnUndo.dispatchEvent(new MouseEvent('click'));
    });

    // --- CTRL + Z (UNDO) ---
    window.addEventListener('keydown', e => {
        if (e.ctrlKey && (e.key === 'z' || e.key === 'Z')) {
            e.preventDefault();
            if (!btnUndo.disabled) btnUndo.click();
        }
    });

    // --- SWITCH PANEL LOGIC ---
    let switchModalDevice = null;
    let swSelectedPort = null;

    function openSwitchModal(device) {
        switchModalDevice = device;
        if (!device.ports) device.ports = {};
        swSelectedPort = null;
        document.getElementById('sw-modal-title').textContent = device.name || 'Switch';
        buildSwitchFaceplate(device);
        showSwEditor(null);
        document.getElementById('switch-modal-overlay').classList.add('open');
    }

    function buildSwitchFaceplate(device) {
        const portCount = device.portCount || 24;
        const ledRow = document.getElementById('sw-port-leds');
        ledRow.innerHTML = '';
        for (let p = 1; p <= portCount; p++) {
            const led = document.createElement('div');
            led.className = 'sw-port-led';
            led.textContent = p;
            led.dataset.port = p;
            const cfg = device.ports[p];
            if (cfg && (cfg.label || cfg.vlan || cfg.conn || cfg.mode !== 'access')) led.classList.add('has-config');
            led.addEventListener('click', () => selectSwPort(p, device));
            ledRow.appendChild(led);
        }
    }

    function selectSwPort(portNum, device) {
        swSelectedPort = portNum;
        document.querySelectorAll('.sw-port-led').forEach(el => el.classList.toggle('selected', +el.dataset.port === portNum));
        showSwEditor(portNum, device);
    }

    // [id, stateKey, defaultVal]
    const SW_FIELDS = [
        ['sw-f-label', 'label', ''],
        ['sw-f-vlan',  'vlan',  ''],
        ['sw-f-mode',  'mode',  'access'],
        ['sw-f-conn',  'conn',  ''],
        ['sw-f-notes', 'notes', '']
    ];

    function showSwEditor(portNum, device) {
        const ph = document.getElementById('sw-editor-placeholder');
        const ed = document.getElementById('sw-port-editor');
        if (portNum === null) { ph.style.display = ''; ed.style.display = 'none'; return; }
        ph.style.display = 'none'; ed.style.display = 'block';
        const cfg = (device || switchModalDevice).ports[portNum] || {};
        document.getElementById('sw-port-editor-title').textContent = `Port ${portNum}`;
        SW_FIELDS.forEach(([id, key, def]) => { document.getElementById(id).value = cfg[key] ?? def; });
    }

    function saveCurrentPortFields() {
        if (swSelectedPort === null || !switchModalDevice) return;
        const cfg = {};
        SW_FIELDS.forEach(([id, key]) => { cfg[key] = document.getElementById(id).value; });
        cfg.vlan = parseInt(cfg.vlan) || null;
        if (typeof cfg.label === 'string') cfg.label = cfg.label.trim();
        if (typeof cfg.conn  === 'string') cfg.conn  = cfg.conn.trim();
        if (typeof cfg.notes === 'string') cfg.notes = cfg.notes.trim();
        const isConfigured = !!(cfg.label || cfg.vlan || cfg.conn || cfg.notes || cfg.mode !== 'access');
        if (isConfigured) { switchModalDevice.ports[swSelectedPort] = cfg; }
        else { delete switchModalDevice.ports[swSelectedPort]; }
        const ledEl = document.querySelector(`.sw-port-led[data-port="${swSelectedPort}"]`);
        if (ledEl) ledEl.classList.toggle('has-config', isConfigured);
    }

    function closeSwModal() {
        saveCurrentPortFields();
        document.getElementById('switch-modal-overlay').classList.remove('open');
        autoSave(); redraw();
    }
    document.getElementById('switch-modal-close').addEventListener('click', closeSwModal);
    document.getElementById('sw-btn-save').addEventListener('click', closeSwModal);

    document.getElementById('sw-btn-clear-port').addEventListener('click', () => {
        if (swSelectedPort === null || !switchModalDevice) return;
        delete switchModalDevice.ports[swSelectedPort];
        showSwEditor(swSelectedPort, switchModalDevice);
        buildSwitchFaceplate(switchModalDevice);
    });

    SW_FIELDS.forEach(([id]) => {
        const el = document.getElementById(id);
        const save = () => { if (swSelectedPort !== null) saveCurrentPortFields(); };
        el.addEventListener('input', save);
        el.addEventListener('change', save);
    });

    // Close on overlay backdrop click
    document.getElementById('switch-modal-overlay').addEventListener('click', e => {
        if (e.target === document.getElementById('switch-modal-overlay')) {
            saveCurrentPortFields();
            document.getElementById('switch-modal-overlay').classList.remove('open');
            autoSave(); redraw();
        }
    });

    // --- EGÉR ÉS ÉRINTŐ ESEMÉNYEK ---
    function handleStart(e, isTouch) {
        if (!img.src || contextMenu.style.display === 'flex') return;
        const wPos = getWorldPos(e), hov = findHoveredPoint(wPos), btn = isTouch ? 0 : e.button;
        hasDragged = false;

        if (e.shiftKey && img.src) {
            isPanningGrid = true;
            const clientX = isTouch ? e.touches[0].clientX : e.clientX;
            const clientY = isTouch ? e.touches[0].clientY : e.clientY;
            gridPanStartX = clientX - gridOffsetX * zoom;
            gridPanStartY = clientY - gridOffsetY * zoom;
            return;
        }

        if (btn === 2 || btn === 1 || (btn === 0 && e.ctrlKey) || (!hov && mode === 'none' && !activePlaceDevice)) {
            isPanning = true; panStartX = (isTouch ? e.touches[0].clientX : e.clientX) - cameraX; panStartY = (isTouch ? e.touches[0].clientY : e.clientY) - cameraY;
            return;
        }

        // In measure/scale mode, don't intercept device clicks — let them add points normally.
        // Only grab devices as draggedPoints in 'none' mode (so they can be moved).
        if (hov) {
            if (hov.type === 'device' && mode !== 'none') {
                // fall through to measure/scale point-adding logic below
            } else {
                draggedPoint = hov;
                if (hov.type === 'cable') { activeCableIndex = hov.cableIndex; status.innerText = t('statEditCable', activeCableIndex + 1); }
                redraw();
                return;
            }
        }

        if (activePlaceDevice && btn === 0) { 
            let p = applyGridSnap(wPos);
            devices.push({ type: activePlaceDevice, x: p.x, y: p.y, name: null }); 
            actionHistory.push({ type: 'device' });
            redraw(); 
            return; 
        }
        
        if (mode === 'scale' && scalePoints.length < 2) { 
            scalePoints.push(applyGridSnap(wPos)); 
            actionHistory.push({ type: 'scale' });
            if (scalePoints.length === 2) btnSetScale.disabled = false; 
            redraw(); 
        } 
        else if (mode === 'measure') { 
            cables[activeCableIndex].push(applyGridSnap(wPos)); 
            actionHistory.push({ type: 'cable', cableIndex: activeCableIndex });
            redraw(); 
        }
    }

    // ponytail: Removed custom crosshair tracking and simplified touch events
    function handleMove(e, isTouch) {
        if (!img.src) return;

        if (isPanningGrid) {
            hasDragged = true;
            const clientX = isTouch ? e.touches[0].clientX : e.clientX;
            const clientY = isTouch ? e.touches[0].clientY : e.clientY;
            gridOffsetX = (clientX - gridPanStartX) / zoom;
            gridOffsetY = (clientY - gridPanStartY) / zoom;
            redraw();
            return;
        }

        if (isPanning) { 
            hasDragged = true;
            cameraX = (isTouch ? e.touches[0].clientX : e.clientX) - panStartX; cameraY = (isTouch ? e.touches[0].clientY : e.clientY) - panStartY; redraw(); return; 
        }
        
        if (draggedPoint) {
            hasDragged = true;
            let pos = applyGridSnap(getWorldPos(e));
            if (draggedPoint.type === 'cable') {
                pos = getSnappedPos(pos);
            }
            draggedPoint.array[draggedPoint.index].x = pos.x; 
            draggedPoint.array[draggedPoint.index].y = pos.y;
            if (draggedPoint.type === 'scale' && pixelsPerMeter) { pixelsPerMeter = null; mode = 'scale'; btnScale.classList.add('active'); btnSetScale.disabled = false; }
        }
        redraw();
    }

    function handleEnd() {
        isPanning = false;
        isPanningGrid = false;
        // Single click (no drag) on a switch device → open switch modal
        if (draggedPoint && !hasDragged && draggedPoint.type === 'device' && devices[draggedPoint.index].type === 'switch' && !activePlaceDevice && mode === 'none') {
            const dev = devices[draggedPoint.index];
            draggedPoint = null;
            redraw();
            openSwitchModal(dev);
            return;
        }
        if (draggedPoint || hasDragged) autoSave();
        draggedPoint = null;
        redraw();
    }

    canvasContainer.addEventListener('mousedown', e => handleStart(e, false));
    canvasContainer.addEventListener('mousemove', e => handleMove(e, false));
    window.addEventListener('mouseup', handleEnd);

    // Single-click on a switch device opens the switch panel modal (handled in handleEnd)

    canvasContainer.addEventListener('touchstart', e => { 
        if(e.touches.length === 1) {
            e.preventDefault(); 
            handleStart(e, true); 
        }
    }, {passive: false});
    canvasContainer.addEventListener('touchmove', e => { 
        if(e.touches.length === 1) {
            e.preventDefault(); 
            handleMove(e, true); 
        }
    }, {passive: false});
    window.addEventListener('touchend', e => { 
        handleEnd(); 
    });

    function applyGridSnap(pos) {
        if (!snapToGrid) return pos;
        const gridSize = 20;
        return {
            x: Math.round((pos.x - gridOffsetX) / gridSize) * gridSize + gridOffsetX,
            y: Math.round((pos.y - gridOffsetY) / gridSize) * gridSize + gridOffsetY
        };
    }

    // Snapping helper
    function getSnappedPos(pos) {
        const snapDist = 15 / zoom;
        for (let d of devices) {
            if (Math.hypot(d.x - pos.x, d.y - pos.y) < snapDist) {
                return { x: d.x, y: d.y };
            }
        }
        return pos;
    }

    // Auto-save logic
    function autoSave() {
        if (!img.src) return;
        const data = { scalePoints, cables, devices, pixelsPerMeter, zoom, cameraX, cameraY, gridOffsetX, gridOffsetY };
        if (img.src.length < 1500000) data.imgSrc = img.src;
        localStorage.setItem('measurer_workspace', JSON.stringify(data));
    }

    // Gombok logika & UNDO
    // ponytail: Replaced custom scale prompt modal with native window.prompt()
    btnSetScale.addEventListener('click', () => {
        if (scalePoints.length !== 2) return;
        const val = prompt(t('promptMeter'));
        if (val) {
            const parsed = parseFloat(val.replace(',', '.'));
            if (!isNaN(parsed) && parsed > 0) {
                pixelsPerMeter = Math.hypot(scalePoints[1].x - scalePoints[0].x, scalePoints[1].y - scalePoints[0].y) / parsed;
                btnSetScale.disabled = true;
                btnScale.classList.remove('active');
                mode = 'none';
                btnMeasure.disabled = btnNewCable.disabled = btnUndo.disabled = btnClear.disabled = false;
                redraw();
                autoSave();
            } else {
                alert(t('statScaleInvalid'));
            }
        }
    });

    // EZEKET MEGTARTOTTUK (maradtak a helyükön):
// --- GOMBOK HOZZÁRENDELÉSEI ---
    btnScale.addEventListener('click', () => { mode = 'scale'; scalePoints = []; pixelsPerMeter = null; btnScale.classList.add('active'); btnMeasure.classList.remove('active'); btnSetScale.disabled = true; status.innerText = t('statScale'); redraw(); });
    btnMeasure.addEventListener('click', () => { mode = 'measure'; btnScale.classList.remove('active'); btnMeasure.classList.add('active'); status.innerText = t('statMeasure'); redraw(); });
    btnNewCable.addEventListener('click', () => { if (cables[activeCableIndex].length > 0) { cables.push([]); activeCableIndex = cables.length - 1; status.innerText = t('statEditCable', activeCableIndex + 1); redraw(); autoSave(); } });
    
    // Globális Undo
    btnUndo.addEventListener('click', () => { 
        const lastAction = actionHistory.pop();
        if (lastAction) {
            if (lastAction.type === 'device' && devices.length > 0) {
                devices.pop();
            } else if (lastAction.type === 'scale' && scalePoints.length > 0) {
                scalePoints.pop();
                pixelsPerMeter = null; btnSetScale.disabled = true; btnScale.classList.add('active'); mode = 'scale';
            } else if (lastAction.type === 'cable') {
                if (cables[lastAction.cableIndex] && cables[lastAction.cableIndex].length > 0) {
                    cables[lastAction.cableIndex].pop();
                } else if (lastAction.cableIndex > 0) {
                    cables.pop(); 
                    activeCableIndex--;
                }
            }
            redraw(); 
            autoSave();
        }
    });

    btnClear.addEventListener('click', () => { if(confirm(t('confirmClear'))) { scalePoints=[]; cables=[[]]; devices=[]; actionHistory=[]; activeCableIndex=0; pixelsPerMeter=null; gridOffsetX=0; gridOffsetY=0; redraw(); autoSave(); } });

    btnExport.addEventListener('click', () => {
        if (!img.src) return;
        const prevMode = mode;
        mode = 'export';
        redraw();
        
        try {
            const { jsPDF } = window.jspdf;
            const orientation = canvas.width > canvas.height ? 'landscape' : 'portrait';
            const pdf = new jsPDF({
                orientation: orientation,
                unit: 'px',
                format: [canvas.width, canvas.height]
            });
            const imgData = canvas.toDataURL('image/jpeg', 0.95);
            pdf.addImage(imgData, 'JPEG', 0, 0, canvas.width, canvas.height);
            pdf.save('floorplan_measured.pdf');
        } catch (e) {
            console.error("PDF export failed, falling back to PNG", e);
            const link = document.createElement('a');
            link.download = 'floorplan_measured.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
        
        mode = prevMode;
        redraw();
    });

    document.getElementById('btn-toggle-layers').addEventListener('click', () => {
        showLayers = !showLayers;
        redraw();
    });

    document.getElementById('btn-snap-grid').addEventListener('click', (e) => {
        snapToGrid = !snapToGrid;
        e.target.classList.toggle('active', snapToGrid);
        redraw();
    });

    document.getElementById('btn-zoom-in').addEventListener('click', () => {
        if (!img.src) return;
        zoom = Math.min(zoom * 1.2, 15);
        redraw();
        autoSave();
    });

    document.getElementById('btn-zoom-out').addEventListener('click', () => {
        if (!img.src) return;
        zoom = Math.max(zoom * 0.8, 0.05);
        redraw();
        autoSave();
    });

    document.getElementById('btn-zoom-reset').addEventListener('click', () => {
        if (!img.src) return;
        zoom = Math.min(canvas.width/img.width, canvas.height/img.height) * 0.95;
        cameraX = (canvas.width - img.width * zoom) / 2;
        cameraY = (canvas.height - img.height * zoom) / 2;
        redraw();
        autoSave();
    });

    // --- RAJZOLÓ MOTOR ---
    function redraw() {
        if (!canvas) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const canvasBgColor = getComputedStyle(document.body).getPropertyValue('--canvas-bg').trim();
        ctx.fillStyle = canvasBgColor || '#ccd0da';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Alaprajz (kép) kirajzolása
        if (img.src) {
            ctx.save();
            ctx.translate(cameraX, cameraY);
            ctx.scale(zoom, zoom);
            ctx.drawImage(img, 0, 0);
            ctx.restore();
        }

        const isExport = (mode === 'export');


        // ponytail: Removed custom crosshair rendering, relying on native CSS cursor

        // 2. LÉPÉS: Kamera transzformáció megnyitása a térbeli objektumoknak (vonalak, pontok)
        ctx.save(); 
        ctx.translate(cameraX, cameraY); 
        ctx.scale(zoom, zoom);

        if (snapToGrid && !isExport && img.src) {
            ctx.save();
            ctx.strokeStyle = 'rgba(120, 120, 120, 0.4)';
            ctx.lineWidth = 1 / zoom;
            const gridSize = 20;
            ctx.beginPath();
            const dx = ((gridOffsetX % gridSize) + gridSize) % gridSize;
            const dy = ((gridOffsetY % gridSize) + gridSize) % gridSize;
            for (let x = dx; x <= img.width; x += gridSize) { ctx.moveTo(x, 0); ctx.lineTo(x, img.height); }
            for (let y = dy; y <= img.height; y += gridSize) { ctx.moveTo(0, y); ctx.lineTo(img.width, y); }
            ctx.stroke();
            ctx.restore();
        }

        // Méretarány vonalak rajzolása
        if (scalePoints.length > 0) {
            ctx.strokeStyle = '#1e66f5'; ctx.lineWidth = 4 / zoom; ctx.fillStyle = 'white';
            if (scalePoints.length === 2) { ctx.beginPath(); ctx.moveTo(scalePoints[0].x, scalePoints[0].y); ctx.lineTo(scalePoints[1].x, scalePoints[1].y); ctx.stroke(); }
            scalePoints.forEach((p, i) => { ctx.globalAlpha = draggedPoint && draggedPoint.type === 'scale' && draggedPoint.index === i && !isExport ? 0.4 : 1.0; ctx.beginPath(); ctx.arc(p.x, p.y, 8 / zoom, 0, 2*Math.PI); ctx.fill(); ctx.stroke(); ctx.globalAlpha = 1.0; });
        }

        // ponytail: Added showLayers toggle check to support layer visibility
        if (showLayers) {
            // Kábelek és pontok rajzolása
            cables.forEach((cable, cIndex) => {
                if (cable.length === 0) return;
                ctx.strokeStyle = cableColors[cIndex % cableColors.length]; ctx.lineWidth = (cIndex === activeCableIndex ? 5 : 3) / zoom; ctx.fillStyle = 'white';
                ctx.beginPath(); ctx.moveTo(cable[0].x, cable[0].y);
                for (let i = 1; i < cable.length; i++) ctx.lineTo(cable[i].x, cable[i].y); ctx.stroke();
                cable.forEach((p, i) => { ctx.globalAlpha = draggedPoint && draggedPoint.type === 'cable' && draggedPoint.cableIndex === cIndex && draggedPoint.index === i && !isExport ? 0.4 : 1.0; ctx.beginPath(); ctx.arc(p.x, p.y, (cIndex === activeCableIndex ? 6 : 4) / zoom, 0, 2*Math.PI); ctx.fill(); ctx.stroke(); ctx.globalAlpha = 1.0; });
            });

            // Eszközök rajzolása
            devices.forEach((d, i) => {
                ctx.save(); ctx.translate(d.x, d.y);
                let color = deviceColors[d.type] || '#8aadf4';
                const shortLabel = d.name || deviceShortnames[d.type] || 'DEV';
                const radius = 15 / zoom;

                ctx.globalAlpha = draggedPoint && draggedPoint.type === 'device' && draggedPoint.index === i && !isExport ? 0.4 : 1.0;
                
                ctx.fillStyle = color;
                ctx.strokeStyle = theme === 'light' ? '#ffffff' : '#11111b';
                ctx.lineWidth = 2.5 / zoom;
                
                ctx.beginPath();
                ctx.arc(0, 0, radius, 0, 2 * Math.PI);
                ctx.fill(); 
                ctx.stroke();

                ctx.fillStyle = '#11111b'; 
                ctx.font = `bold ${11 / zoom}px 'Segoe UI', sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(shortLabel, 0, 0.5 / zoom);

                ctx.restore();
            });
        }

        // Close camera transform
        ctx.restore();

        // Calculate cable lengths in a single pass
        if (pixelsPerMeter) {
            let totalMeters = 0, activeLen = 0;
            cables.forEach((cable, cIndex) => {
                for (let i = 1; i < cable.length; i++) {
                    const seg = Math.hypot(cable[i].x - cable[i-1].x, cable[i].y - cable[i-1].y) / pixelsPerMeter;
                    totalMeters += seg;
                    if (cIndex === activeCableIndex) activeLen += seg;
                }
            });
            measurements.innerHTML = `<span style="color:var(--danger);margin-right:15px;">${t('textActive', activeCableIndex+1)}: <b>${activeLen.toFixed(2)} m</b></span><span style="color:var(--success);">${t('textTotal')}: <b>${totalMeters.toFixed(2)} m</b></span>`;
        } else {
            measurements.innerHTML = '';
        }
    }

    function loadSavedWorkspace() {
        try {
            const data = JSON.parse(localStorage.getItem('measurer_workspace') || 'null');
            if (!data) return;
            if (data.imgSrc) {
                img.onload = () => { resizeCanvas(); restoreState(data, true); };
                img.src = data.imgSrc;
            } else {
                restoreState(data, false);
            }
        } catch (e) {
            console.error('Error loading saved workspace', e);
        }
    }

    // Call load on startup
    loadSavedWorkspace();
    updateLanguageUI();
    document.getElementById('btn-mobile-menu').addEventListener('click', () => {
        document.getElementById('controls').classList.toggle('open');
    });

    document.querySelectorAll('#controls button').forEach(btn => {
        btn.addEventListener('click', () => {
            if (window.innerWidth <= 768) {
                document.getElementById('controls').classList.remove('open');
            }
        });
    });
</script>
</body>
